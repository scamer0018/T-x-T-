# Termux Pro Theme - Main ZSH Configuration
# Version: 1.0

# History settings
HISTSIZE=10000
SAVEHIST=10000
HISTFILESIZE=20000
setopt appendhistory
setopt incappendhistory
setopt sharehistory
setopt histignorealldups

# Oh My ZSH plugins
plugins=(
  git
  history
  history-substring-search
  zsh-autosuggestions
  zsh-syntax-highlighting
  python
  pip
)

# Load Oh My ZSH
export ZSH="$HOME/.oh-my-zsh"
source $ZSH/oh-my-zsh.sh

# Custom PROMPT - Multi-line professional design
PROMPT=$'\n%F{red}┌─[%F{green}Root%F{cyan}@%F{yellow}Device%F{red}]─[%F{blue}%~%F{red}]\n%F{red}└─[%F{magenta}%D{%H:%M:%S}%F{red}] %F{white}→ '
# Right prompt with git branch
RPROMPT='%F{cyan}[%F{green}$(git branch 2>/dev/null | grep "^*" | colrm 1 2)%F{cyan}]'

# Default editor
export EDITOR=nano
export VISUAL=nano

# Language settings
export LANG=en_US.UTF-8
export LC_ALL=en_US.UTF-8

# LS colors
export LS_COLORS="di=1;36:ln=1;35:so=1;32:pi=1;33:ex=1;31:bd=34;46:cd=34;43:su=30;41:sg=30;46:tw=30;42:ow=30;43"

# Welcome message
clear
echo "╔══════════════════════════════════════════════════════╗"
echo "║         Termux Pro Theme - $(date +%Y)                ║"
echo "║         User: $USER @ $(hostname)                       ║"
echo "╚══════════════════════════════════════════════════════╝"
echo "Type 'help' for available commands"
echo ""
